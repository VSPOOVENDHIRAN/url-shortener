version: "3.9"

services:
  app:
    build: .
    container_name: url-shortener-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7
    container_name: url-shortener-redis
    ports:
      - "6379:6379"
    restart: always